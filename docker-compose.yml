services:
  asa:
    build: ./docker
    container_name: asa-server
    restart: unless-stopped
    ports:
      - "7777:7777/udp"
      - "27015:27015/udp"
      - "27020:27020/tcp"
    volumes:
      - ./data/asa:/home/steam/asa
      - ./data/wineprefix:/home/steam/wineprefix
    environment:
      - WINEDEBUG=-all
      - SESSION_NAME=${SESSION_NAME}
      - SERVER_PASSWORD=${SERVER_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - GAME_PORT=${GAME_PORT}
      - QUERY_PORT=${QUERY_PORT}
      - RCON_PORT=${RCON_PORT}
      - MAP_NAME=${MAP_NAME}
      - MOD_IDS=${MOD_IDS}